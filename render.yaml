services:
  # ── Backend API (Web Service) ──────────────────────────────────────────────
  - type: web
    name: employee-system-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: employee-system-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
    healthCheckPath: /health

  # ── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: employee-system-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database ────────────────────────────────────────────────────
databases:
  - name: employee-system-db
    databaseName: employee_system
    user: employee_admin
    plan: free
